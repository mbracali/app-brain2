<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>brain2 - start</title>
    <link rel="stylesheet" href="../static/css/catppuccin.css" />
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: #000000;
        color: var(--ctp-text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto,
          Helvetica, Arial, sans-serif;
        display: grid;
        place-items: center;
      }

      .start-shell {
        width: min(1200px, calc(100vw - 12rem));
        min-height: min(760px, calc(100vh - 12rem));
        border-radius: 18px;
        border: 1px solid color-mix(in srgb, var(--ctp-accent) 55%, #000000);
        background: linear-gradient(145deg, var(--ctp-base), var(--ctp-mantle));
        box-shadow:
          0 0 0 1px color-mix(in srgb, var(--ctp-accent) 20%, transparent),
          0 18px 45px rgba(0, 0, 0, 0.55);
        display: grid;
        grid-template-columns: minmax(220px, 33.333%) 1fr;
        overflow: hidden;
        position: relative;
      }

      .start-sidebar {
        background: linear-gradient(180deg, var(--ctp-surface0), var(--ctp-surface1));
        border-right: 1px solid color-mix(in srgb, var(--ctp-accent) 45%, #000000);
        padding: 1.25rem;
        display: flex;
        flex-direction: column;
        gap: 0.9rem;
      }

      .sidebar-top {
        display: flex;
        align-items: center;
        justify-content: flex-start;
        gap: 0.35rem;
        color: var(--ctp-text);
        font-weight: 700;
      }

      .sidebar-title {
        font-size: 1.1rem;
        line-height: 1;
      }

      .sidebar-brain {
        font-size: 1.7rem;
        line-height: 1;
      }

      .sidebar-actions {
        display: flex;
        justify-content: flex-start;
      }

      .brains-list {
        flex: 1;
        min-height: 0;
        overflow-y: auto;
        padding-right: 0.2rem;
        display: flex;
        flex-direction: column;
        gap: 0.55rem;
      }

      .sidebar-empty {
        margin: 0;
        font-size: 0.82rem;
        color: var(--ctp-subtext0);
      }

      .brain-item {
        border: 1px solid var(--ctp-overlay0);
        background: color-mix(in srgb, var(--ctp-surface0) 70%, var(--ctp-mantle));
        border-radius: 10px;
        padding: 0.5rem 0.62rem;
      }

      .brain-item-title {
        margin: 0;
        font-size: 0.84rem;
      }

      .brain-item-meta {
        margin: 0.24rem 0 0;
        font-size: 0.74rem;
        color: var(--ctp-subtext1);
      }

      .brain-item-path {
        margin: 0.24rem 0 0;
        font-size: 0.7rem;
        color: var(--ctp-overlay1);
      }

      .new-brrain-btn {
        width: fit-content;
        border: 1px solid var(--ctp-button-border);
        background: var(--ctp-button-bg);
        color: var(--ctp-button-text);
        border-radius: 8px;
        padding: 0.45rem 0.7rem;
        font-size: 0.88rem;
        font-weight: 600;
        line-height: 1.2;
        cursor: pointer;
        transition: background-color 0.2s ease, border-color 0.2s ease, transform 0.12s ease;
      }

      .new-brrain-btn:hover {
        background: var(--ctp-button-bg-hover);
        border-color: var(--ctp-lavender);
      }

      .new-brrain-btn:active {
        transform: translateY(1px);
      }

      .new-brrain-btn:focus-visible {
        outline: 2px solid var(--ctp-lavender);
        outline-offset: 2px;
      }

      .start-main {
        background: rgba(17, 17, 27, 0.65);
        position: relative;
      }

      .overlay-backdrop {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.48);
        display: grid;
        place-items: center;
        z-index: 8;
      }

      .brain-modal {
        width: min(680px, calc(100% - 2.4rem));
        border: 1px solid var(--ctp-accent);
        border-radius: 14px;
        background: var(--ctp-base);
        box-shadow: 0 25px 44px rgba(0, 0, 0, 0.5);
        padding: 1rem;
      }

      .modal-section {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }

      .modal-input {
        width: 100%;
        border: 1px solid var(--ctp-overlay0);
        background: var(--ctp-mantle);
        color: var(--ctp-text);
        border-radius: 8px;
        padding: 0.55rem 0.7rem;
      }

      .modal-help {
        margin: 0;
        color: var(--ctp-subtext1);
        font-size: 0.82rem;
      }

      .modal-separator {
        border: none;
        border-top: 1px dashed var(--ctp-overlay0);
        margin: 0.85rem 0;
      }

      .modal-categories {
        flex-direction: row;
        flex-wrap: wrap;
        gap: 0.9rem;
      }

      .modal-categories label,
      .inline-toggle {
        display: inline-flex;
        align-items: center;
        gap: 0.38rem;
        font-size: 0.88rem;
        color: var(--ctp-text);
      }

      .folder-row {
        margin-top: 0.22rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.9rem;
      }

      .modal-select-btn {
        white-space: nowrap;
      }

      .modal-footer {
        margin-top: 0.95rem;
        display: flex;
        align-items: center;
        gap: 0.55rem;
      }

      .new-brrain-btn[disabled] {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .modal-close-btn {
        border: 1px solid var(--ctp-overlay0);
        background: var(--ctp-surface0);
        color: var(--ctp-text);
        border-radius: 8px;
        padding: 0.45rem 0.7rem;
        font-size: 0.88rem;
        cursor: pointer;
      }

      .modal-error {
        margin: 0.8rem 0 0;
        color: var(--ctp-red);
        font-size: 0.82rem;
      }

      .app-version {
        position: absolute;
        right: 1rem;
        bottom: 0.85rem;
        margin: 0;
        color: #ffffff;
        font-size: 0.74rem;
        font-weight: 500;
        letter-spacing: 0.02em;
        opacity: 0.9;
      }

      @media (max-width: 760px) {
        .start-shell {
          width: calc(100vw - 6rem);
          min-height: calc(100vh - 6rem);
          border-radius: 14px;
          grid-template-columns: 1fr;
          grid-template-rows: minmax(180px, 33.333%) 1fr;
        }

        .start-sidebar {
          border-right: none;
          border-bottom: 1px solid color-mix(in srgb, var(--ctp-accent) 45%, #000000);
        }

        .folder-row {
          flex-direction: column;
          align-items: flex-start;
        }
      }
    </style>
  </head>
  <body>
    <main class="start-shell" hx-boost="true">
      <aside class="start-sidebar" aria-label="Project and setup navigation">
        <div class="sidebar-top">
          <span class="sidebar-brain" role="img" aria-label="Brain">🧠</span>
          <span class="sidebar-title">- Brain2</span>
        </div>
        <div class="sidebar-actions">
          <button
            class="new-brrain-btn"
            type="button"
            hx-get="/brains/modal"
            hx-target="#modal-root"
            hx-swap="innerHTML"
          >
            Add brain
          </button>
        </div>
        <div id="brains-list" class="brains-list">
          <!-- BRAINS_LIST_PLACEHOLDER -->
        </div>
      </aside>
      <section class="start-main" aria-label="Main workspace area">
        <div id="modal-root"></div>
        <p class="app-version">Beta V0.0.1</p>
      </section>
    </main>
    <script>
      window.brain2SetupModal = function () {
        const form = document.getElementById("brain-create-form");
        if (!form) return;

        const nameInput = form.querySelector('input[name="brain_name"]');
        const folderInput = form.querySelector('input[name="root_folder"]');
        const categoryInputs = form.querySelectorAll('input[name="categories"]');
        const createButton = document.getElementById("create-brain-btn");
        const pickerButton = document.getElementById("folder-picker-btn");
        const pickerInput = document.getElementById("folder-picker-input");

        const updateCreateState = function () {
          const hasName = !!nameInput.value.trim();
          const hasFolder = !!folderInput.value.trim();
          const hasCategory = Array.from(categoryInputs).some((item) => item.checked);
          createButton.disabled = !(hasName && hasFolder && hasCategory);
        };

        nameInput.addEventListener("input", updateCreateState);
        folderInput.addEventListener("input", updateCreateState);
        categoryInputs.forEach((item) => item.addEventListener("change", updateCreateState));

        pickerButton.addEventListener("click", function () {
          pickerInput.click();
        });

        pickerInput.addEventListener("change", function () {
          const file = pickerInput.files && pickerInput.files[0];
          if (!file) return;
          const relative = file.webkitRelativePath || "";
          const folderName = relative.split("/")[0];
          if (folderName) folderInput.value = folderName;
          updateCreateState();
        });

        updateCreateState();
      };
    </script>
  </body>
</html>
